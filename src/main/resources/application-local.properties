# Profilo per database locale
# Per usare questo profilo: java -jar app.jar --spring.profiles.active=local
# oppure: mvn spring-boot:run -Dspring-boot.run.profiles=local

# PostgreSQL locale
spring.datasource.url=jdbc:postgresql://localhost:5432/govpay_37
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=govpay
spring.datasource.password=govpay

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disabilita il server web embedded (applicazione batch pura)
spring.main.web-application-type=none

# H2 Console disabilitato
spring.h2.console.enabled=false

# Batch configuration
govpay.batch.enabled=true

# Cluster ID per tracciamento eventi
govpay.batch.cluster-id=GovPay-FDR-Batch-Local

# Logging piu' dettagliato per sviluppo locale
logging.level.it.govpay.fdr.batch=DEBUG
logging.level.org.springframework.batch=DEBUG
logging.level.org.springframework.web.client=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.it.govpay.fdr.batch.gde=DEBUG
