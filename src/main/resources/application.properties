# Disabilita la stampa del banner spring nei log
spring.main.banner-mode=off

# Application name
spring.application.name=govpay-fdr-batch

spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Europe/Rome

# Spring Batch configuration
spring.batch.job.enabled=false

# Batch configuration
govpay.batch.enabled=true
govpay.batch.connettore-pagopa-fdr=PAGOPA_FDR
govpay.batch.max-retries=3
govpay.batch.page-size=1000
govpay.batch.thread-pool-size=5
govpay.batch.headers-chunk-size=1
govpay.batch.metadata-chunk-size=100
govpay.batch.payments-chunk-size=50
govpay.batch.skip-limit=10

# Cluster ID configuration (unique identifier for each node in multi-node setup)
govpay.batch.cluster-id=GovPay-FDR-Batch

# Multi-node job execution timeout configuration
# Maximum minutes since last update before a job is considered stale/stuck (default: 120 minutes = 2 hours)
govpay.batch.stale-threshold-minutes=120

# Scheduler configuration
# Fixed delay between job executions (in milliseconds) - default 2 hours
scheduler.fdrAcquisitionJob.fixedDelayString=7200000
# Initial delay before first execution (in milliseconds) - default 1ms
scheduler.initialDelayString=1

# GDE (Event Tracking) configuration
govpay.gde.enabled=true
govpay.batch.connettore-gde=GDE

# Actuator configuration
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.health.db.enabled=true

# Logging configuration
logging.level.root=INFO
logging.level.it.govpay.fdr.batch=DEBUG
logging.level.org.springframework.batch=DEBUG
logging.level.org.springframework.web.client=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
