# Test Application Configuration
spring.application.name=govpay-fdr-batch-test

# Disable batch job auto-start in tests
spring.batch.job.enabled=false

# Prevent the @Scheduled trigger of ScheduledJobRunner from firing during tests:
# tests invoke the runner manually, and a concurrent auto-fire would race the
# manual execution (the JobConcurrencyService guard is mocked out in unit tests).
scheduler.initialDelayString=3600000

# H2 Test Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Logging for tests
logging.level.root=INFO
logging.level.it.govpay=DEBUG

# Batch configuration for tests
govpay.batch.max-retries=3
